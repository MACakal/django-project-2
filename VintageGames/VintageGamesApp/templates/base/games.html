{% extends 'base/base.html' %}
{% block title %}Games{% endblock %}
{% block content %}
<h1>All Games</h1>
{% for game in games %}
<div class="game-item">
    <p><strong>{{ game.name }}</strong> &mdash; {{ game.console }} ({{ game.releaseyear }})</p>
</div>
{% empty %}
<p>No games yet.</p>
{% endfor %}
{% endblock content %}
