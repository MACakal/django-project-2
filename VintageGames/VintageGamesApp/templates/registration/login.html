{% extends 'base/base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<h1>Login</h1>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="Login">
</form>
<p style="font-size:0.9rem;color:#6b7280;">Don't have an account? <a href="{% url 'register' %}">Sign up</a></p>
<p style="font-size:0.85rem;color:#9ca3af;margin-top:2rem;">Made by Mehmet Akif Cakal &amp; Ahmad Ali</p>
{% endblock content %}
