{% extends 'base/base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<h1>Create Account</h1>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="Sign Up">
</form>
<p style="font-size:0.9rem;color:#6b7280;">Already have an account? <a href="{% url 'login' %}">Login</a></p>
{% endblock content %}
